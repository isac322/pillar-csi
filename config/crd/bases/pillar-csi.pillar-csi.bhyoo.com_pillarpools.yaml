---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: pillarpools.pillar-csi.pillar-csi.bhyoo.com
spec:
  group: pillar-csi.pillar-csi.bhyoo.com
  names:
    kind: PillarPool
    listKind: PillarPoolList
    plural: pillarpools
    shortNames:
    - pp
    singular: pillarpool
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.targetRef
      name: Target
      type: string
    - jsonPath: .spec.backend.type
      name: Backend
      type: string
    - jsonPath: .status.capacity.available
      name: Available
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PillarPool represents a specific storage pool on a PillarTarget.  Users
          create PillarPool resources to declare that a pool is available for CSI
          volume provisioning; the controller validates availability and updates status.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of PillarPool.
            properties:
              backend:
                description: backend describes the storage technology and pool to
                  use.
                properties:
                  lvm:
                    description: lvm holds LVM-specific configuration; required when
                      type is lvm-lv.
                    properties:
                      provisioningMode:
                        default: linear
                        description: |-
                          provisioningMode controls whether new volumes are created as fully-
                          allocated linear LVs or as thin-provisioned LVs inside the thinPool.
                          Defaults to "linear"; set to "thin" together with a non-empty thinPool
                          to enable thin provisioning.
                        enum:
                        - linear
                        - thin
                        type: string
                      thinPool:
                        description: |-
                          thinPool is the name of the LVM thin pool LV within the volume group
                          (e.g. "thin-pool-0").  When non-empty the backend operates in thin-
                          provisioned mode; when empty it creates fully-allocated linear LVs.
                          The thin pool must be pre-created before the agent starts.
                        type: string
                      volumeGroup:
                        description: |-
                          volumeGroup is the LVM Volume Group name that pillar-csi will create
                          logical volumes in (e.g. "data-vg").  The VG must be pre-created on
                          the node before the agent starts; the driver does not manage VG lifecycle.
                        minLength: 1
                        type: string
                    required:
                    - volumeGroup
                    type: object
                  type:
                    description: type identifies the backend driver.
                    enum:
                    - zfs-zvol
                    - zfs-dataset
                    - lvm-lv
                    - dir
                    type: string
                  zfs:
                    description: zfs holds ZFS-specific configuration; required when
                      type is zfs-zvol or zfs-dataset.
                    properties:
                      parentDataset:
                        description: |-
                          parentDataset is the ZFS dataset path under which pillar-csi will
                          create per-volume datasets or zvols (e.g. "k8s").
                        type: string
                      pool:
                        description: pool is the ZFS pool name (e.g. "hot-data").
                        minLength: 1
                        type: string
                      properties:
                        additionalProperties:
                          type: string
                        description: |-
                          properties are arbitrary ZFS properties applied to every volume created
                          in this pool (e.g. compression, volblocksize).
                        type: object
                    required:
                    - pool
                    type: object
                required:
                - type
                type: object
              targetRef:
                description: targetRef is the name of the PillarTarget this pool lives
                  on.
                minLength: 1
                type: string
            required:
            - backend
            - targetRef
            type: object
          status:
            description: status defines the observed state of PillarPool.
            properties:
              capacity:
                description: capacity reflects the latest capacity reading for this
                  pool.
                properties:
                  available:
                    anyOf:
                    - type: integer
                    - type: string
                    description: available is the free capacity available for new
                      volumes.
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  total:
                    anyOf:
                    - type: integer
                    - type: string
                    description: total is the gross capacity of the pool.
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  used:
                    anyOf:
                    - type: integer
                    - type: string
                    description: used is the amount of capacity already consumed.
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                type: object
              conditions:
                description: |-
                  conditions represent the current state of the PillarPool resource.

                  Known condition types:
                  - "TargetReady"       – the referenced PillarTarget is in Ready state.
                  - "PoolDiscovered"    – the pool named in spec.backend has been found on the agent.
                  - "BackendSupported"  – the backend type is listed in the agent's capabilities.
                  - "Ready"             – all checks pass; the pool can provision volumes.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
