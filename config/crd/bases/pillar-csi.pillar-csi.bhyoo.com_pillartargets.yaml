---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: pillartargets.pillar-csi.pillar-csi.bhyoo.com
spec:
  group: pillar-csi.pillar-csi.bhyoo.com
  names:
    kind: PillarTarget
    listKind: PillarTargetList
    plural: pillartargets
    shortNames:
    - pt
    singular: pillartarget
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.resolvedAddress
      name: Address
      type: string
    - jsonPath: .status.agentVersion
      name: Agent
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PillarTarget represents a storage agent instance that pillar-csi controller
          manages.  Users create PillarTarget resources; the controller reconciles gRPC
          connectivity and populates status fields.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of PillarTarget.
            properties:
              external:
                description: |-
                  external addresses a storage agent that lives outside the Kubernetes cluster.
                  Mutually exclusive with nodeRef.
                properties:
                  address:
                    description: address is the IP or hostname of the external agent.
                    minLength: 1
                    type: string
                  port:
                    description: port is the agent gRPC port.
                    format: int32
                    maximum: 65535
                    minimum: 1
                    type: integer
                required:
                - address
                - port
                type: object
              nodeRef:
                description: |-
                  nodeRef references a Kubernetes Node whose agent is accessible via the node's IP.
                  Mutually exclusive with external.
                properties:
                  addressSelector:
                    description: |-
                      addressSelector is an optional CIDR filter applied when multiple addresses of
                      the same type exist on the node.
                    type: string
                  addressType:
                    default: InternalIP
                    description: |-
                      addressType selects which address type to use from the node's status.addresses.
                      Defaults to InternalIP.
                    enum:
                    - InternalIP
                    - ExternalIP
                    type: string
                  name:
                    description: name is the Kubernetes Node name.
                    minLength: 1
                    type: string
                  port:
                    description: port overrides the default agent gRPC port (9500).
                    format: int32
                    maximum: 65535
                    minimum: 1
                    type: integer
                required:
                - name
                type: object
            type: object
          status:
            description: status defines the observed state of PillarTarget.
            properties:
              agentVersion:
                description: agentVersion is the version string reported by the connected
                  agent.
                type: string
              capabilities:
                description: capabilities summarises what the connected agent is capable
                  of.
                properties:
                  backends:
                    description: |-
                      backends lists the backend driver types the agent can manage
                      (e.g. zfs-zvol, zfs-dataset, lvm-lv).
                    items:
                      type: string
                    type: array
                  protocols:
                    description: |-
                      protocols lists the network protocols the agent can export storage over
                      (e.g. nvmeof-tcp, iscsi, nfs).
                    items:
                      type: string
                    type: array
                type: object
              conditions:
                description: |-
                  conditions represent the current state of the PillarTarget resource.

                  Known condition types:
                  - "NodeExists"     – the referenced K8s Node is present in the cluster.
                  - "AgentConnected" – the gRPC connection to the agent is healthy.
                  - "Ready"          – all checks pass; the target is ready to serve pools.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              discoveredPools:
                description: discoveredPools lists storage pools found on the agent
                  at last reconcile.
                items:
                  description: DiscoveredPool is a storage pool reported by the remote
                    agent.
                  properties:
                    available:
                      anyOf:
                      - type: integer
                      - type: string
                      description: available is the free capacity of the pool.
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    name:
                      description: name is the pool name as known to the storage subsystem
                        (e.g. ZFS pool name).
                      type: string
                    total:
                      anyOf:
                      - type: integer
                      - type: string
                      description: total is the total raw capacity of the pool.
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    type:
                      description: type is the storage technology (e.g. zfs, lvm).
                      type: string
                  required:
                  - name
                  - type
                  type: object
                type: array
              resolvedAddress:
                description: resolvedAddress is the IP address selected for gRPC communication
                  with the agent.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
