---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: pillarbindings.pillar-csi.pillar-csi.bhyoo.com
spec:
  group: pillar-csi.pillar-csi.bhyoo.com
  names:
    kind: PillarBinding
    listKind: PillarBindingList
    plural: pillarbindings
    shortNames:
    - pb
    singular: pillarbinding
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.poolRef
      name: Pool
      type: string
    - jsonPath: .spec.protocolRef
      name: Protocol
      type: string
    - jsonPath: .status.storageClassName
      name: StorageClass
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PillarBinding combines a PillarPool and a PillarProtocol to create a
          Kubernetes StorageClass.  A validation webhook rejects incompatible
          backend/protocol combinations (e.g. block backend with NFS).
          Parameter overrides allow fine-tuning per binding without changing the
          shared pool or protocol resources.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of PillarBinding.
            properties:
              overrides:
                description: |-
                  overrides provides a fine-grained parameter layer on top of the
                  referenced pool and protocol defaults.
                properties:
                  backend:
                    description: backend contains backend-specific parameter overrides.
                    properties:
                      lvm:
                        description: lvm overrides LVM-specific parameters; used when
                          the pool backend is lvm-lv.
                        properties:
                          provisioningMode:
                            allOf:
                            - enum:
                              - linear
                              - thin
                            - enum:
                              - linear
                              - thin
                            description: |-
                              provisioningMode overrides the LVM provisioning mode for this binding.
                              Accepted values: "linear" (fully-allocated LV) or "thin"
                              (thin-provisioned LV inside the backend's thin pool).
                              When omitted, the PillarPool-level default is used.
                            type: string
                        type: object
                      zfs:
                        description: |-
                          zfs overrides ZFS-specific properties; used when the pool backend is
                          zfs-zvol or zfs-dataset.
                        properties:
                          properties:
                            additionalProperties:
                              type: string
                            description: |-
                              properties are arbitrary ZFS properties that override pool defaults
                              (e.g. volblocksize, compression).
                            type: object
                        type: object
                    type: object
                  fsType:
                    description: |-
                      fsType overrides the protocol-level fsType for this binding.
                      Only relevant for block protocols with volumeMode: Filesystem.
                    enum:
                    - ext4
                    - xfs
                    type: string
                  mkfsOptions:
                    description: mkfsOptions overrides the protocol-level mkfsOptions
                      for this binding.
                    items:
                      type: string
                    type: array
                  protocol:
                    description: protocol contains protocol-specific parameter overrides.
                    properties:
                      iscsi:
                        description: iscsi overrides iSCSI parameters.
                        properties:
                          loginTimeout:
                            description: loginTimeout overrides the protocol-level
                              loginTimeout.
                            format: int32
                            minimum: 0
                            type: integer
                          replacementTimeout:
                            description: replacementTimeout overrides the protocol-level
                              replacementTimeout.
                            format: int32
                            minimum: 0
                            type: integer
                        type: object
                      nvmeofTcp:
                        description: nvmeofTcp overrides NVMe-oF/TCP parameters.
                        properties:
                          inCapsuleDataSize:
                            description: inCapsuleDataSize overrides the protocol-level
                              inCapsuleDataSize.
                            format: int32
                            minimum: 0
                            type: integer
                          maxQueueSize:
                            description: maxQueueSize overrides the protocol-level
                              maxQueueSize.
                            format: int32
                            minimum: 1
                            type: integer
                        type: object
                      smb:
                        description: smb overrides SMB/CIFS parameters.
                        properties:
                          port:
                            description: port overrides the protocol-level SMB port.
                            format: int32
                            maximum: 65535
                            minimum: 1
                            type: integer
                        type: object
                    type: object
                type: object
              poolRef:
                description: poolRef is the name of the PillarPool to use for provisioning.
                minLength: 1
                type: string
              protocolRef:
                description: protocolRef is the name of the PillarProtocol used to
                  expose volumes.
                minLength: 1
                type: string
              storageClass:
                description: |-
                  storageClass configures the Kubernetes StorageClass that this binding
                  generates.  The controller creates and owns the StorageClass; deleting
                  the PillarBinding also deletes the StorageClass.
                properties:
                  allowVolumeExpansion:
                    description: |-
                      allowVolumeExpansion enables online volume expansion.
                      When unset the controller derives the value from backend capabilities.
                    type: boolean
                  name:
                    description: |-
                      name is the name of the generated StorageClass.
                      Defaults to the PillarBinding's own name when omitted.
                    minLength: 1
                    type: string
                  reclaimPolicy:
                    default: Delete
                    description: |-
                      reclaimPolicy determines what happens to a PersistentVolume when its
                      PersistentVolumeClaim is deleted.
                    enum:
                    - Delete
                    - Retain
                    type: string
                  volumeBindingMode:
                    default: Immediate
                    description: volumeBindingMode controls when volume binding and
                      dynamic provisioning occur.
                    enum:
                    - Immediate
                    - WaitForFirstConsumer
                    type: string
                type: object
            required:
            - poolRef
            - protocolRef
            type: object
          status:
            description: status reflects the reconciler-observed state of this binding.
            properties:
              conditions:
                description: |-
                  conditions represent the current state of the PillarBinding resource.

                  Known condition types:
                  - "PoolReady"           – the referenced PillarPool is in Ready state.
                  - "ProtocolValid"       – the referenced PillarProtocol exists and is valid.
                  - "Compatible"          – the pool backend and protocol are compatible
                                            (e.g. block backend cannot be combined with NFS).
                  - "StorageClassCreated" – the Kubernetes StorageClass has been created.
                  - "Ready"               – all checks pass; the binding is operational.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              storageClassName:
                description: storageClassName is the name of the generated StorageClass.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
