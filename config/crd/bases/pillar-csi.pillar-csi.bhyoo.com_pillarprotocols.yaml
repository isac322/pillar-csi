---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: pillarprotocols.pillar-csi.pillar-csi.bhyoo.com
spec:
  group: pillar-csi.pillar-csi.bhyoo.com
  names:
    kind: PillarProtocol
    listKind: PillarProtocolList
    plural: pillarprotocols
    shortNames:
    - ppr
    singular: pillarprotocol
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .status.bindingCount
      name: Bindings
      type: integer
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PillarProtocol describes a reusable network-storage protocol configuration.
          It is node-independent: the same PillarProtocol can be referenced by multiple
          PillarBinding resources across different pools and targets.  The controller
          resolves the target bind address at runtime from the relevant PillarTarget.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired protocol configuration.
            properties:
              fsType:
                default: ext4
                description: |-
                  fsType is the default filesystem type for block protocols when
                  volumeMode is Filesystem.  Only relevant for block-based protocols
                  (nvmeof-tcp, iscsi).
                enum:
                - ext4
                - xfs
                type: string
              iscsi:
                description: iscsi holds iSCSI configuration; required when type is
                  iscsi.
                properties:
                  acl:
                    default: false
                    description: |-
                      acl enables initiator IQN-based access control when true.
                      When false the target allows any initiator.
                      Defaults to false so that e2e tests and simple deployments work
                      without registering initiator IQNs.
                    type: boolean
                  loginTimeout:
                    description: |-
                      loginTimeout is the number of seconds to wait for a login response.
                      Defaults to 15.
                    format: int32
                    minimum: 0
                    type: integer
                  nodeSessionTimeout:
                    description: |-
                      nodeSessionTimeout is the number of seconds for the node session
                      retry timeout. Defaults to 120.
                    format: int32
                    minimum: 0
                    type: integer
                  port:
                    default: 3260
                    description: |-
                      port is the TCP port on which the iSCSI target listens.
                      Defaults to 3260.
                    format: int32
                    maximum: 65535
                    minimum: 1
                    type: integer
                  replacementTimeout:
                    description: |-
                      replacementTimeout is the number of seconds to wait for a session
                      replacement after a connection failure. Defaults to 120.
                    format: int32
                    minimum: 0
                    type: integer
                type: object
              mkfsOptions:
                description: |-
                  mkfsOptions are additional arguments passed to mkfs when formatting a
                  new volume.  Only relevant for block-based protocols.
                items:
                  type: string
                type: array
              nfs:
                description: nfs holds NFS configuration; required when type is nfs.
                properties:
                  version:
                    default: "4.2"
                    description: version is the NFS protocol version to use (e.g.
                      "4.2").
                    type: string
                type: object
              nvmeofTcp:
                description: nvmeofTcp holds NVMe-oF/TCP configuration; required when
                  type is nvmeof-tcp.
                properties:
                  acl:
                    default: false
                    description: |-
                      acl enables host NQN-based access control when true.
                      When false the subsystem uses allow_any_host.
                      Defaults to false (allow_any_host) so that e2e tests and simple
                      deployments work without registering initiator NQNs.
                    type: boolean
                  ctrlLossTmo:
                    description: |-
                      ctrlLossTmo is the maximum seconds to wait before declaring a target
                      permanently lost after connectivity failure.
                    format: int32
                    minimum: 0
                    type: integer
                  inCapsuleDataSize:
                    description: inCapsuleDataSize is the maximum in-capsule data
                      size in bytes.
                    format: int32
                    minimum: 0
                    type: integer
                  maxQueueSize:
                    description: maxQueueSize is the maximum number of I/O queue entries
                      per connection.
                    format: int32
                    minimum: 1
                    type: integer
                  port:
                    default: 4420
                    description: |-
                      port is the TCP port on which the NVMe-oF target listens.
                      Defaults to 4420.
                    format: int32
                    maximum: 65535
                    minimum: 1
                    type: integer
                  reconnectDelay:
                    description: reconnectDelay is the interval in seconds between
                      reconnect attempts.
                    format: int32
                    minimum: 0
                    type: integer
                type: object
              type:
                description: type identifies the network storage protocol.
                enum:
                - nvmeof-tcp
                - iscsi
                - nfs
                type: string
            required:
            - type
            type: object
          status:
            description: status reflects the reconciler-observed state of this protocol.
            properties:
              activeTargets:
                description: |-
                  activeTargets lists the names of PillarTargets currently serving
                  volumes via this protocol.  Maintained automatically by the reconciler.
                items:
                  type: string
                type: array
              bindingCount:
                description: |-
                  bindingCount is the number of PillarBinding resources that reference
                  this protocol.  Maintained automatically by the reconciler.
                format: int32
                type: integer
              conditions:
                description: |-
                  conditions represent the current state of the PillarProtocol resource.

                  Known condition types:
                  - "Ready" – the protocol configuration is valid and ready for use.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
