# This rule is not used by the project pillar-csi itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over pillar-csi.pillar-csi.bhyoo.com.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: pillar-csi
    app.kubernetes.io/managed-by: kustomize
  name: pillarpool-admin-role
rules:
- apiGroups:
  - pillar-csi.pillar-csi.bhyoo.com
  resources:
  - pillarpools
  verbs:
  - '*'
- apiGroups:
  - pillar-csi.pillar-csi.bhyoo.com
  resources:
  - pillarpools/status
  verbs:
  - get
