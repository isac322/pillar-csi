# This rule is not used by the project pillar-csi itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to pillar-csi.pillar-csi.bhyoo.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: pillar-csi
    app.kubernetes.io/managed-by: kustomize
  name: pillarbinding-viewer-role
rules:
- apiGroups:
  - pillar-csi.pillar-csi.bhyoo.com
  resources:
  - pillarbindings
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - pillar-csi.pillar-csi.bhyoo.com
  resources:
  - pillarbindings/status
  verbs:
  - get
