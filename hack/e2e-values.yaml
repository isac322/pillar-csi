# hack/e2e-values.yaml
#
# Helm values overrides for the pillar-csi e2e test environment.
#
# These values are layered on top of charts/pillar-csi/values.yaml by
# hack/e2e-setup.sh using `helm upgrade --install -f hack/e2e-values.yaml`.
#
# Key differences from production defaults:
#   - Images are loaded directly into the Kind cluster via `kind load
#     docker-image`; imagePullPolicy is set to Never so Kubernetes never
#     tries to pull from a registry.
#   - Image repositories reference locally-built images (no registry prefix).
#     The tag is overridden at deploy time via --set (default: e2e).
#   - Resource requests/limits are reduced to fit inside a Kind cluster
#     running on a CI runner or developer laptop.
#   - Prometheus ServiceMonitor is disabled (no prometheus-operator in Kind).
#   - CRDs are installed as part of the release (simplifies teardown).

# ── Global image pull policy ──────────────────────────────────────────────────
# Never: images are pre-loaded into Kind nodes; no registry is needed.
imagePullPolicy: Never

# ── CRDs ──────────────────────────────────────────────────────────────────────
installCRDs: true

# ── Controller ────────────────────────────────────────────────────────────────
controller:
  image:
    # Local image built by hack/e2e-setup.sh.
    # Tag is overridden via --set controller.image.tag=${IMAGE_TAG} at deploy time.
    repository: pillar-csi-controller
    tag: e2e
    pullPolicy: Never

  # Reduced resource limits for Kind / CI.
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi

  sidecars:
    provisioner:
      resources:
        limits:
          cpu: 100m
          memory: 64Mi
        requests:
          cpu: 10m
          memory: 32Mi

    attacher:
      resources:
        limits:
          cpu: 100m
          memory: 64Mi
        requests:
          cpu: 10m
          memory: 32Mi

    resizer:
      resources:
        limits:
          cpu: 100m
          memory: 64Mi
        requests:
          cpu: 10m
          memory: 32Mi

    livenessProbe:
      resources:
        limits:
          cpu: 50m
          memory: 32Mi
        requests:
          cpu: 5m
          memory: 16Mi

# ── Node DaemonSet ────────────────────────────────────────────────────────────
node:
  image:
    # Local image built by hack/e2e-setup.sh.
    repository: pillar-csi-node
    tag: e2e
    pullPolicy: Never

  # Reduced resource limits for Kind / CI.
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi

  sidecars:
    nodeDriverRegistrar:
      resources:
        limits:
          cpu: 100m
          memory: 64Mi
        requests:
          cpu: 10m
          memory: 32Mi

    livenessProbe:
      resources:
        limits:
          cpu: 50m
          memory: 32Mi
        requests:
          cpu: 5m
          memory: 16Mi

# ── Agent DaemonSet ───────────────────────────────────────────────────────────
agent:
  image:
    # Local image built by hack/e2e-setup.sh.
    repository: pillar-csi-agent
    tag: e2e
    pullPolicy: Never

  # Reduced resource limits for Kind / CI.
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi

# ── Metrics / Monitoring ──────────────────────────────────────────────────────
# No prometheus-operator in Kind; skip ServiceMonitor creation.
metrics:
  serviceMonitor:
    enabled: false
