# Helm values for pillar-csi e2e tests (internal-agent mode).
#
# These values are applied on top of charts/pillar-csi/values.yaml when the
# Go test infrastructure calls "helm install" during BeforeSuite.  They are
# optimised for a local Kind cluster: images are loaded directly into Kind
# nodes (no registry), resource limits are relaxed so tests pass on CI
# runners with limited CPU/memory, and CRDs are installed by the chart.
#
# Image tags are intentionally set to "e2e" — the Go test framework builds
# each binary with that tag and calls "kind load docker-image" before Helm
# install.  Changing this value requires updating the corresponding constant
# in test/e2e/setup.go (E2EImageTag).

# Global pull policy is Never — all images (CSI sidecars, busybox init
# containers) are pre-loaded into Kind nodes via buildAndLoadImages Phase 3.
# This eliminates Docker Hub pulls (HTTP 429 rate limits) at test runtime.
imagePullPolicy: Never

# Install CRDs as part of the Helm release so the test cluster is
# self-contained and does not rely on a separately managed CRD chart.
installCRDs: true

# ── controller ────────────────────────────────────────────────────────────────
controller:
  replicaCount: 1

  image:
    # Matches the image built and loaded by the Go test framework.
    repository: ghcr.io/bhyoo/pillar-csi/controller
    tag: "e2e"
    pullPolicy: Never

  # Disable webhooks and secure metrics in e2e (no cert-manager available).
  extraArgs:
    - --metrics-secure=false
  extraEnv:
    - name: ENABLE_WEBHOOKS
      value: "false"
    # Speed up reconcile loops so e2e tests do not need long polling timeouts.
    - name: PILLAR_RECONCILE_INTERVAL
      value: "2s"

  # Reduced limits for CI runners.
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi

  sidecars:
    provisioner:
      resources:
        limits:
          cpu: 100m
          memory: 64Mi
        requests:
          cpu: 10m
          memory: 32Mi
    attacher:
      resources:
        limits:
          cpu: 100m
          memory: 64Mi
        requests:
          cpu: 10m
          memory: 32Mi
    resizer:
      resources:
        limits:
          cpu: 100m
          memory: 64Mi
        requests:
          cpu: 10m
          memory: 32Mi
    livenessProbe:
      resources:
        limits:
          cpu: 50m
          memory: 32Mi
        requests:
          cpu: 5m
          memory: 16Mi

# ── node ──────────────────────────────────────────────────────────────────────
node:
  image:
    repository: ghcr.io/bhyoo/pillar-csi/node
    tag: "e2e"
    pullPolicy: Never

  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 10m
      memory: 64Mi

  sidecars:
    nodeDriverRegistrar:
      resources:
        limits:
          cpu: 100m
          memory: 64Mi
        requests:
          cpu: 10m
          memory: 32Mi
    livenessProbe:
      resources:
        limits:
          cpu: 50m
          memory: 32Mi
        requests:
          cpu: 5m
          memory: 16Mi

# ── agent (internal-agent mode) ───────────────────────────────────────────────
# The agent DaemonSet is scheduled only on nodes labelled
# pillar-csi.bhyoo.com/storage-node=true.  The kind-config.yaml in this
# same directory pre-labels worker-0 with that label so the DaemonSet pod
# is running before the first test case executes.
agent:
  image:
    repository: ghcr.io/bhyoo/pillar-csi/agent
    tag: "e2e"
    pullPolicy: Never

  # DM_DISABLE_UDEV tells libdevmapper to manage device nodes directly instead
  # of delegating to udev.  This is required in containers where udevd is not
  # running (Kind nodes, CI pods).  Safe on bare-metal hosts too.
  extraEnv:
    - name: DM_DISABLE_UDEV
      value: "1"

  # --backend registers storage backends.
  #
  # ZFS zvol backend: the e2e pool name matches the ZFS loopback pool created
  # by TestMain via framework.CreateLoopbackZFSPool ("e2e-pool").  The Kind
  # storage worker has /dev/zfs bind-mounted from the host so the agent can
  # access the ZFS kernel module and enumerate pools.
  #
  # LVM thin backend: the VG and thin pool are created by TestMain via
  # framework.SetupLoopbackLVMVG inside the Kind storage-node container.
  # The VG name ("e2e-vg") and thin pool name ("e2e-thinpool") match the
  # defaults in E2EEnv.  lvm2 is installed inside the Kind worker container
  # by the setup script if not already present.
  #
  # --configfs-root=/tmp avoids requiring real nvmet kernel modules for the
  # NVMe-oF configfs path (pure ZFS/LVM tests do not need it).
  extraArgs:
    - --backend=type=zfs-zvol,pool=e2e-pool
    - --backend=type=lvm-lv,vg=e2e-vg,thinpool=e2e-thinpool
    - --configfs-root=/tmp
    - --listen-address=:9500

  # Run the agent container as privileged so it can open /dev/zfs (character
  # device 10:249) inside the Kind node container.  Without privileged mode the
  # cgroup device controller blocks device access for non-privileged pods even
  # when runAsUser=0 + SYS_ADMIN are set, causing "zpool list e2e-pool" to
  # fail and DiscoveredPools to remain empty (PoolDiscovered stays Unknown).
  privileged: true

  # Load kernel modules required by the agent backends before the agent
  # container starts.  dm_thin_pool is required for the LVM thin-provisioning
  # backend; nvmet and nvmet_tcp are required for NVMe-oF target exposure.
  initModprobe:
    modules:
      - nvmet
      - nvmet_tcp
      - dm_thin_pool

  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 10m
      memory: 64Mi

  # Keep the default nodeSelector so the agent only runs on storage nodes.
  nodeSelector:
    pillar-csi.bhyoo.com/storage-node: "true"

  # gRPC port must match the value used by tests and PillarTarget CRs.
  grpcPort: 9500
  hostPort: 9500

# ── RBAC & ServiceAccounts ────────────────────────────────────────────────────
rbac:
  create: true

serviceAccount:
  controller:
    create: true
  node:
    create: true
  agent:
    create: true

# ── CSIDriver ─────────────────────────────────────────────────────────────────
csiDriver:
  create: true
  attachRequired: true
  podInfoOnMount: true
  fsGroupPolicy: File
  volumeLifecycleModes:
    - Persistent

# ── Metrics ───────────────────────────────────────────────────────────────────
metrics:
  serviceMonitor:
    # No Prometheus operator in the e2e cluster; skip ServiceMonitor creation.
    enabled: false
