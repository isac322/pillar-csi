# Kind cluster configuration for pillar-csi e2e tests.
#
# Layout: 1 control-plane node + 2 worker nodes.
#
# The storage worker node mounts /sys/kernel/config (configfs) from the host
# so that:
#   - NVMe-oF target kernel modules (nvmet, nvmet_tcp) can expose their
#     configfs API inside the Kind node containers via /sys/kernel/config.
#     Without this mount the pillar-agent init container would silently fail
#     to configure NVMe-oF targets, causing the storage-protocol tests to hang.
#
# Note on /dev: mounting the host /dev directory into Kind node containers
# causes the container init to fail with "open /dev/console: input/output error"
# because the host console device is not accessible from within the container
# context.  Real ZFS zvol and NVMe block device access is provided instead
# through the DockerHostExec framework helper, which runs privileged commands
# on the remote Docker host directly — bypassing the need for device bind-mounts
# inside Kind.
#
# API server binding: apiServerAddress is set to "0.0.0.0" so that the
# Kubernetes API server is reachable from outside the Docker daemon host.
# When running against a remote Docker daemon (e.g. tcp://10.111.0.1:2375),
# the default "127.0.0.1" binding would only be accessible on the remote host
# itself; "0.0.0.0" allows the test binary running locally to connect via the
# remote host's WireGuard/routable IP address.
#
# Privileged init containers (modprobe) require the worker nodes to run
# with the SYS_ADMIN capability, which Kind enables automatically when
# extraMounts from /sys are present.
#
# Node labels applied here are used by the Helm chart's agent nodeSelector
# (pillar-csi.bhyoo.com/storage-node=true) so that the agent DaemonSet is
# scheduled on the designated storage worker nodes immediately after Helm
# install, without waiting for the controller to label them.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

networking:
  # Bind the API server to all interfaces so that the test process running on
  # a different machine (connected via WireGuard) can reach it.  The default
  # "127.0.0.1" only allows connections from the Docker daemon host itself.
  apiServerAddress: "0.0.0.0"

nodes:
  # ── control-plane ──────────────────────────────────────────────────────────
  - role: control-plane

  # ── storage worker node 1 ──────────────────────────────────────────────────
  # Labelled as a storage node so the pillar-agent DaemonSet is scheduled here.
  - role: worker
    labels:
      pillar-csi.bhyoo.com/storage-node: "true"
    extraMounts:
      # Mount the host configfs so NVMe-oF target modules can write to it.
      # HostToContainer propagation ensures that kernel module entries written
      # by the host (e.g. nvmet subsystem directories) appear inside the
      # Kind node container's configfs subtree.
      - hostPath: /sys/kernel/config
        containerPath: /sys/kernel/config
        propagation: HostToContainer

  # ── worker node 2 ──────────────────────────────────────────────────────────
  # General-purpose worker for application pods and initiator-side CSI tests.
  - role: worker
