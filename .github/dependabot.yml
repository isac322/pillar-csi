version: 2
updates:
  # Go modules (go.mod)
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: daily
    groups:
      # controller-runtime and k8s.io/* must be upgraded together — they
      # share the same Kubernetes release cycle and have breaking API
      # changes across minor versions.  A single grouped PR lets the
      # maintainer fix code alongside the version bump.
      k8s-ecosystem:
        patterns:
          - "k8s.io/*"
          - "sigs.k8s.io/controller-runtime"

  # Dockerfile base images (unified multi-target Dockerfile)
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: daily

  # GitHub Actions (ci.yml, release.yml)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
