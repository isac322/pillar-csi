name: Release

on:
  release:
    types: [published]

jobs:
  image:
    name: Push image
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Restore BuildKit cache mounts
        uses: actions/cache@v5
        id: cache
        with:
          path: buildkit-cache
          key: buildkit-mount-${{ hashFiles('Dockerfile') }}-${{ github.sha }}
          restore-keys: |
            buildkit-mount-${{ hashFiles('Dockerfile') }}-

      - name: Inject/extract BuildKit cache mounts
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          builder: ${{ steps.buildx.outputs.name }}
          cache-dir: buildkit-cache
          skip-extraction: ${{ steps.cache.outputs.cache-hit }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push all images
        uses: docker/bake-action@v5
        with:
          files: docker-bake.hcl
          push: true
          set: |
            *.platform=linux/amd64,linux/arm64,linux/arm/v7,linux/s390x,linux/ppc64le,linux/riscv64
            controller.tags=ghcr.io/${{ github.repository }}/controller:${{ steps.version.outputs.tag }}
            agent.tags=ghcr.io/${{ github.repository }}/agent:${{ steps.version.outputs.tag }}
            node.tags=ghcr.io/${{ github.repository }}/node:${{ steps.version.outputs.tag }}

  chart:
    name: Push chart
    if: startsWith(github.event.release.tag_name, 'chart-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Extract chart version
        id: version
        run: echo "version=${GITHUB_REF_NAME#chart-v}" >> "$GITHUB_OUTPUT"

      - name: Package chart
        run: helm package charts/pillar-csi --version "${{ steps.version.outputs.version }}"

      - name: Push chart to GHCR
        run: helm push pillar-csi-${{ steps.version.outputs.version }}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
