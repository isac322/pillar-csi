name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run linter
        uses: golangci/golangci-lint-action@v9

  verify-tc-coverage:
    name: TC Coverage Verification
    runs-on: ubuntu-latest
    # Skip when commit message contains [skip tc-verify] (infrastructure-only
    # changes that don't affect the E2E spec coverage).
    if: |
      !contains(github.event.head_commit.message, '[skip tc-verify]')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # ── Install Ginkgo CLI ─────────────────────────────────────────────────
      # Ginkgo is needed by verify-tc-coverage-runtime; the static mode used
      # in this CI job does not require it, but installing it here keeps the
      # job self-contained and ready for future upgrade to runtime mode.
      - name: Install Ginkgo CLI
        run: go install github.com/onsi/ginkgo/v2/ginkgo@latest

      # ── Static coverage check ───────────────────────────────────────────────
      # Scans test/e2e/*.go for "[TC-<ID>]" inside Ginkgo It/Describe literals.
      # Reports MISSING, EXTRA, and DUPLICATE; exits 0 (report-only) so that
      # the pipeline is not broken while specs are still being implemented.
      #
      # Switch to --strict once all 437 specs are implemented to turn this into
      # a hard gate: make verify-tc-coverage-strict
      - name: Run TC coverage verification (static, report-only)
        id: tc_verify
        run: |
          go mod tidy
          make verify-tc-coverage 2>&1 | tee /tmp/tc-coverage-report.txt
          # Extract summary line for the step output
          SUMMARY=$(grep -m1 '^declared_total=' /tmp/tc-coverage-report.txt || echo "no summary found")
          echo "summary=${SUMMARY}" >> "$GITHUB_OUTPUT"

      # ── Emit step summary ──────────────────────────────────────────────────
      - name: Emit coverage summary
        if: always()
        run: |
          REPORT=/tmp/tc-coverage-report.txt
          {
            echo "## TC Coverage Verification"
            echo ""
            if [ -f "$REPORT" ]; then
              echo '```'
              cat "$REPORT"
              echo '```'
            else
              echo "_Report not generated_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [verify-tc-coverage]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: |
          go mod tidy
          make test

  e2e:
    name: E2E Tests (multi-node Kind)
    runs-on: ubuntu-latest
    # Run on every push and pull_request (workflow-level triggers already set).
    # Skip if the commit message contains [skip e2e] or [e2e skip].
    if: |
      !contains(github.event.head_commit.message, '[skip e2e]') &&
      !contains(github.event.head_commit.message, '[e2e skip]')
    permissions:
      contents: read  # checkout only; no packages write needed (images stay local)

    # ── Job-level defaults ─────────────────────────────────────────────────────
    # Centralise all tuneable values here so they are easy to bump without
    # hunting through individual step definitions.
    env:
      # ── Kind tooling ──────────────────────────────────────────────────────
      # kind tool release to install.  Bump together with KIND_NODE_IMAGE when
      # upgrading the Kubernetes version used in the e2e cluster.
      KIND_VERSION: "v0.27.0"

      # ── Cluster & image names ─────────────────────────────────────────────
      KIND_CLUSTER: "pillar-csi-e2e"
      E2E_IMAGE_TAG: "e2e"
      # Helm namespace where pillar-csi is deployed.
      E2E_HELM_NAMESPACE: "pillar-csi-system"
      # Ginkgo parallel worker count for the full e2e suite.
      E2E_PROCS: "8"
      # Stop scheduling new specs after the first failure.
      E2E_FAIL_FAST: "true"

      # ── Docker daemon endpoint ────────────────────────────────────────────
      # Explicitly set the Docker daemon endpoint so that all sub-processes
      # (kind, docker, helm) use the same daemon.
      DOCKER_HOST: "unix:///var/run/docker.sock"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # ── install tooling ────────────────────────────────────────────────────
      # install_only=true: lay down the kind binary without creating a cluster.
      # TestMain in test/e2e/setup_test.go owns cluster lifecycle (create if
      # missing, reuse if healthy, build images, helm install, run tests).
      # Cluster deletion is handled by the selected Make e2e target at the end.
      - name: Install Kind ${{ env.KIND_VERSION }}
        uses: helm/kind-action@v1
        with:
          install_only: true
          version: ${{ env.KIND_VERSION }}

      - name: Install Helm
        uses: azure/setup-helm@v5

      # ── install ZFS, LVM, and NVMe kernel modules ────────────────────────
      # ZFS userspace tools (zpool, zfs, losetup) and LVM tools (pvcreate,
      # vgcreate, lvcreate, etc.) must be present on the GitHub Actions runner
      # host because DockerHostExec runs privileged commands via
      # `nsenter -t 1 -m ...` into the host's mount namespace.  The commands
      # run inside the host's filesystem, so the binaries must be installed
      # there — not just inside the privileged helper container.
      #
      # LVM tools are required because the e2e TestMain creates a loopback-
      # backed LVM Volume Group (e2e-vg) and thin pool (e2e-thinpool) on the
      # Docker host via DockerHostExec.ExecOnHost().  These commands need:
      #   - lvm2: pvcreate, vgcreate, lvcreate, lvremove, lvs, vgs
      #   - thin-provisioning-tools: thin_check (validates thin pool metadata)
      #
      # NVMe-oF kernel modules are required for two reasons:
      #   1. kind-config.yaml bind-mounts /dev/nvme-fabrics into the compute-
      #      worker Kind node; Kind/Docker fails to create the node container
      #      if the source device does not exist on the host.  Loading
      #      nvme_fabrics causes the kernel to create /dev/nvme-fabrics.
      #   2. The mount/unmount lifecycle e2e specs write a real NVMe-oF TCP
      #      target to /sys/kernel/config/nvmet (via docker exec into the
      #      storage-worker Kind container, which bind-mounts /sys/kernel/config
      #      from the host), then use nvme_tcp to connect from the compute-worker.
      #
      # Device-mapper kernel modules are required for LVM:
      #   - dm_mod: base device-mapper module; creates /dev/mapper/control
      #   - dm_thin_pool: thin-provisioning target for LVM thin pools
      #
      # ── Parallel Ginkgo execution strategy ───────────────────────────────
      # The full Ginkgo suite runs through `make test-e2e-parallel` with
      # --procs=${E2E_PROCS}.  The suite-level isolation work derives per-worker
      # NVMe-oF ports and unique cluster-scoped names, while Ordered containers
      # still preserve ordering within each worker.  The Make target performs
      # two passes (internal-agent then external-agent), emits per-pass and
      # total wall-clock timing, and deletes the Kind cluster at the end.
      #
      # linux-modules-extra-$(uname -r) ships all four NVMe modules on ubuntu-latest.
      - name: Install ZFS, LVM, and NVMe kernel modules
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zfsutils-linux lvm2 thin-provisioning-tools \
            linux-modules-extra-$(uname -r) || \
            sudo apt-get install -y zfsutils-linux lvm2 thin-provisioning-tools
          sudo modprobe zfs
          sudo modprobe dm_mod
          sudo modprobe dm_thin_pool
          sudo modprobe nvme_fabrics
          sudo modprobe nvmet
          sudo modprobe nvmet_tcp
          sudo modprobe nvme_tcp
          # Verify /dev/mapper/control exists (created by dm_mod) so that
          # kind-config.yaml's /dev/mapper Bidirectional extraMount succeeds.
          test -e /dev/mapper/control && echo "LVM: /dev/mapper/control present" || \
            (echo "ERROR: /dev/mapper/control missing after dm_mod load" && exit 1)

      # ── pre-pull third-party images ────────────────────────────────────────
      # Pull all Docker Hub base images and third-party sidecar images into
      # the local Docker daemon cache BEFORE any docker build or Kind cluster
      # creation.  Two categories:
      #
      # 1. Dockerfile base images — alpine:3.21 and golang:1.26-alpine3.23 are
      #    the FROM stages in the unified multi-target Dockerfile.
      #    Pre-pulling them here means "docker build" finds them in the local
      #    cache and never contacts Docker Hub, avoiding HTTP 429 rate-limit
      #    and HTTP 401 auth errors for anonymous runners.
      #
      # 2. Helm chart runtime images — buildAndLoadImages() copies them from
      #    the daemon cache into Kind nodes via docker save + docker cp so that
      #    pods start without hitting registry rate-limits at runtime.
      - name: Pre-pull Docker Hub base images (Dockerfile stages)
        run: |
          # Runtime base used by agent and node targets in the unified Dockerfile.
          docker pull alpine:3.21@sha256:56fa17d2a7e7f168a043a2712e63aed1f8543aeafdcee47c58dcffe38ed51099
          docker tag \
            alpine:3.21@sha256:56fa17d2a7e7f168a043a2712e63aed1f8543aeafdcee47c58dcffe38ed51099 \
            alpine:3.21
          # Shared builder stage used by all three targets.
          docker pull golang:1.26-alpine3.23

      - name: Pre-pull third-party images
        run: |
          docker pull busybox:1.36
          docker pull registry.k8s.io/sig-storage/csi-provisioner:v5.2.0
          docker pull registry.k8s.io/sig-storage/csi-attacher:v4.8.1
          docker pull registry.k8s.io/sig-storage/csi-resizer:v1.13.2
          docker pull registry.k8s.io/sig-storage/livenessprobe:v2.15.0
          docker pull registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.13.0

      # ── run tests ─────────────────────────────────────────────────────────
      # make test-e2e is the canonical entry point for the full 437-TC Ginkgo
      # suite.  The timing gate below records wall-clock duration and fails the
      # job if it exceeds the 120-second budget mandated by the spec.
      #
      # Implementation notes:
      #   - SECONDS is a Bash built-in that auto-increments each second; using
      #     it avoids a second `date` call and is immune to clock skew.
      #   - The make invocation is run with `&&` so that a test failure is still
      #     captured in MAKE_RC and the timing check runs regardless.
      #   - go mod tidy is intentionally placed before SECONDS is read so that
      #     module-cache warm-up time is excluded from the budget measurement.
      - name: Run full e2e suite with 120s timing gate
        id: e2e_run
        run: |
          go mod tidy
          E2E_START=$SECONDS
          make test-e2e && MAKE_RC=0 || MAKE_RC=$?
          E2E_ELAPSED=$(( SECONDS - E2E_START ))
          echo "elapsed=${E2E_ELAPSED}" >> "$GITHUB_OUTPUT"
          echo "::notice title=e2e-timing::make test-e2e wall-clock ${E2E_ELAPSED}s (budget 120s)"
          if [ "${MAKE_RC}" -ne 0 ]; then
            echo "::error title=e2e-failed::make test-e2e exited with status ${MAKE_RC}"
            exit "${MAKE_RC}"
          fi
          if [ "${E2E_ELAPSED}" -gt 120 ]; then
            echo "::error title=e2e-timeout::make test-e2e took ${E2E_ELAPSED}s which exceeds the 120s budget"
            exit 1
          fi

      # Emit a step summary table regardless of pass/fail so the timing is
      # always visible in the GitHub Actions UI without opening the log.
      - name: Emit e2e timing summary
        if: always()
        run: |
          ELAPSED="${{ steps.e2e_run.outputs.elapsed }}"
          if [ -z "$ELAPSED" ]; then ELAPSED="unknown"; fi
          {
            echo "## E2E Timing Gate"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Wall-clock | ${ELAPSED}s |"
            echo "| Budget | 120s |"
            if [ "$ELAPSED" != "unknown" ] && [ "$ELAPSED" -gt 120 ] 2>/dev/null; then
              echo "| Status | ❌ EXCEEDED — job failed |"
            elif [ "$ELAPSED" = "unknown" ]; then
              echo "| Status | ⚠️ timing unavailable |"
            else
              echo "| Status | ✅ within budget |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ── e2e-bench ──────────────────────────────────────────────────────────────
  # CI baseline benchmark job.
  #
  # Runs the in-process e2e suite (no -tags=e2e → no Kind cluster, no ZFS/LVM)
  # via `go test ./test/e2e/... -count=1` and fails the build if total
  # wall-clock time exceeds 120 seconds.
  #
  # This job acts as a canary: if a newly added spec or a shared setup change
  # causes the in-process suite to slow beyond the 2-minute budget the build
  # breaks immediately, before the heavier Kind-cluster jobs are scheduled.
  #
  # Skip with [skip e2e] or [e2e skip] in the commit message (same gate as
  # the full e2e job so that hotfixes bypass both in one flag).
  e2e-bench:
    name: E2E Baseline Benchmark (≤120s)
    runs-on: ubuntu-latest
    if: |
      !contains(github.event.head_commit.message, '[skip e2e]') &&
      !contains(github.event.head_commit.message, '[e2e skip]')
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # go mod tidy ensures the module cache is warm before timing begins so
      # network latency does not inflate the wall-clock measurement.
      - name: Warm module cache
        run: go mod tidy

      # Record the start timestamp so we can emit an independent wall-clock
      # measurement in the step summary even if make test-e2e-bench exits
      # non-zero (i.e. tests failed before the 120s limit was hit).
      - name: Run e2e baseline benchmark
        id: bench
        run: |
          BENCH_START=$(date +%s)
          make test-e2e-bench && BENCH_RC=0 || BENCH_RC=$?
          BENCH_ELAPSED=$(( $(date +%s) - BENCH_START ))
          echo "elapsed=${BENCH_ELAPSED}" >> "$GITHUB_OUTPUT"
          echo "::notice title=e2e-bench::Wall-clock ${BENCH_ELAPSED}s (limit 120s)"
          exit ${BENCH_RC}

      # Always emit a step summary so the elapsed time is visible in the GHA
      # UI regardless of pass/fail.  The summary references the TC budget so
      # reviewers understand the threshold without consulting the Makefile.
      - name: Emit benchmark summary
        if: always()
        run: |
          ELAPSED="${{ steps.bench.outputs.elapsed }}"
          if [ -z "$ELAPSED" ]; then ELAPSED="unknown"; fi
          {
            echo "## E2E Baseline Benchmark"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Wall-clock | ${ELAPSED}s |"
            echo "| Budget | 120s |"
            if [ "$ELAPSED" != "unknown" ] && [ "$ELAPSED" -gt 120 ] 2>/dev/null; then
              echo "| Status | ❌ EXCEEDED |"
            else
              echo "| Status | ✅ PASS |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build (all platforms)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Restore BuildKit cache mounts
        uses: actions/cache@v5
        id: cache
        with:
          path: buildkit-cache
          key: buildkit-mount-${{ hashFiles('Dockerfile') }}-${{ github.sha }}
          restore-keys: |
            buildkit-mount-${{ hashFiles('Dockerfile') }}-

      - name: Inject/extract BuildKit cache mounts
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          builder: ${{ steps.buildx.outputs.name }}
          cache-dir: buildkit-cache
          skip-extraction: ${{ steps.cache.outputs.cache-hit }}

      - name: Build all images for all platforms
        uses: docker/bake-action@v7
        with:
          files: docker-bake.hcl
          set: |
            *.platform=linux/amd64,linux/arm64,linux/arm/v7,linux/s390x,linux/ppc64le,linux/riscv64
