name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run linter
        uses: golangci/golangci-lint-action@v9

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: |
          go mod tidy
          make test

  e2e:
    name: E2E Tests (multi-node Kind)
    runs-on: ubuntu-latest
    # Run on every push and pull_request (workflow-level triggers already set).
    # Skip if the commit message contains [skip e2e] or [e2e skip].
    if: |
      !contains(github.event.head_commit.message, '[skip e2e]') &&
      !contains(github.event.head_commit.message, '[e2e skip]')
    permissions:
      contents: read  # checkout only; no packages write needed (images stay local)

    # ── Job-level defaults ─────────────────────────────────────────────────────
    # Centralise all tuneable values here so they are easy to bump without
    # hunting through individual step definitions.
    env:
      # ── Kind tooling ──────────────────────────────────────────────────────
      # kind tool release to install.  Bump together with KIND_NODE_IMAGE when
      # upgrading the Kubernetes version used in the e2e cluster.
      KIND_VERSION: "v0.27.0"

      # ── Cluster & image names ─────────────────────────────────────────────
      KIND_CLUSTER: "pillar-csi-e2e"
      E2E_IMAGE_TAG: "e2e"
      # Helm namespace where pillar-csi is deployed.
      E2E_HELM_NAMESPACE: "pillar-csi-system"

      # ── Docker daemon endpoint ────────────────────────────────────────────
      # On GitHub Actions ubuntu-latest the Docker daemon listens on the Unix
      # socket only; override the Makefile default of tcp://localhost:2375 so
      # that kind, docker, and helm sub-processes all reach the correct daemon.
      DOCKER_HOST: "unix:///var/run/docker.sock"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # ── install tooling ────────────────────────────────────────────────────
      # install_only=true: lay down the kind binary without creating a cluster.
      # TestMain in test/e2e/setup_test.go owns the full cluster lifecycle
      # (create → build images → helm install → run tests → helm uninstall →
      # delete cluster) so no cluster is created here.
      - name: Install Kind ${{ env.KIND_VERSION }}
        uses: helm/kind-action@v1
        with:
          install_only: true
          version: ${{ env.KIND_VERSION }}

      - name: Install Helm
        uses: azure/setup-helm@v5

      # ── install ZFS ────────────────────────────────────────────────────────
      # ZFS userspace tools (zpool, zfs, losetup) must be present on the
      # GitHub Actions runner host because DockerHostExec runs privileged
      # commands via `nsenter -t 1 -m ...` into the host's mount namespace.
      # The host kernel already ships the ZFS module on ubuntu-latest;
      # `modprobe zfs` loads it so /dev/zfs is available for zpool operations.
      - name: Install ZFS tools and load kernel modules
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zfsutils-linux
          sudo modprobe zfs

      # ── run tests ─────────────────────────────────────────────────────────
      # make test-e2e is the single entry point for the full e2e lifecycle.
      # TestMain (test/e2e/setup_test.go) creates the Kind cluster, builds and
      # loads the container images, installs the Helm chart, runs all tests,
      # and tears everything down — no external scripts required.
      - name: Run e2e tests
        run: |
          go mod tidy
          make test-e2e
        env:
          KIND_CLUSTER: ${{ env.KIND_CLUSTER }}
          E2E_IMAGE_TAG: ${{ env.E2E_IMAGE_TAG }}
          E2E_HELM_NAMESPACE: ${{ env.E2E_HELM_NAMESPACE }}
          # Use the unix socket so docker/kind/helm sub-processes reach the
          # local Docker daemon on ubuntu-latest (TCP is not exposed by default).
          DOCKER_HOST: unix:///var/run/docker.sock

  build:
    name: Build (all platforms)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Restore BuildKit cache mounts
        uses: actions/cache@v5
        id: cache
        with:
          path: buildkit-cache
          key: buildkit-mount-${{ hashFiles('Dockerfile') }}-${{ github.sha }}
          restore-keys: |
            buildkit-mount-${{ hashFiles('Dockerfile') }}-

      - name: Inject/extract BuildKit cache mounts
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          builder: ${{ steps.buildx.outputs.name }}
          cache-dir: buildkit-cache
          skip-extraction: ${{ steps.cache.outputs.cache-hit }}

      - name: Build for all platforms
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/s390x,linux/ppc64le,linux/riscv64
