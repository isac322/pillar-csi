                required:
                - type
                type: object
              targetRef:
                description: targetRef is the name of the PillarTarget this pool lives
                  on.
                minLength: 1
                type: string
            required:
            - backend
            - targetRef
            type: object
          status:
            description: status defines the observed state of PillarPool.
            properties:
              capacity:
                description: capacity reflects the latest capacity reading for this
                  pool.
