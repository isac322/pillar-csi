{{/*
ServiceAccount for the pillar-csi controller.
Controlled by .Values.serviceAccount.controller.create
*/}}
{{- if .Values.serviceAccount.controller.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "pillar-csi.controllerServiceAccountName" . }}
  namespace: {{ include "pillar-csi.namespace" . }}
  labels:
    {{- include "pillar-csi.componentLabels" (dict "root" . "component" "controller") | nindent 4 }}
  {{- with .Values.serviceAccount.controller.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
---
{{/*
ServiceAccount for the pillar-node DaemonSet.
Controlled by .Values.serviceAccount.node.create
*/}}
{{- if .Values.serviceAccount.node.create -}}
