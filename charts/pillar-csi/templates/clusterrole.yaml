{{/*
ClusterRole for the pillar-csi controller.
Rules are ported from config/rbac/role.yaml.
Controlled by .Values.rbac.create
*/}}
{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "pillar-csi.fullname" . }}
  labels:
    {{- include "pillar-csi.componentLabels" (dict "root" . "component" "controller") | nindent 4 }}
rules:
  # Core: node access (controller patches node labels/annotations for storage nodes)
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
      - list
      - patch
      - update
      - watch
  # Core: Pod access (csi-resizer needs to list pods for volume-in-use detection)
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
  # Core: PVC access (controller watches PVCs to reconcile PillarBinding lifecycle)
  - apiGroups:
      - ""
    resources:
      - persistentvolumeclaims
    verbs:
      - get
      - list
      - watch
  # pillar-csi CRDs: full management of pillar resources
  - apiGroups:
      - pillar-csi.pillar-csi.bhyoo.com
    resources:
      - pillarbindings
      - pillarpools
      - pillarprotocols
      - pillartargets
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  # pillar-csi CRDs: finalizer management
  - apiGroups:
      - pillar-csi.pillar-csi.bhyoo.com
    resources:
      - pillarbindings/finalizers
      - pillarpools/finalizers
      - pillarprotocols/finalizers
      - pillartargets/finalizers
    verbs:
      - update
  # pillar-csi CRDs: status subresource management
  - apiGroups:
      - pillar-csi.pillar-csi.bhyoo.com
    resources:
      - pillarbindings/status
      - pillarpools/status
      - pillarprotocols/status
      - pillartargets/status
    verbs:
      - get
      - patch
      - update
  # storage.k8s.io: StorageClass management (controller provisions/deprovisions storage classes)
  - apiGroups:
      - storage.k8s.io
    resources:
      - storageclasses
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  # Leader election requires leases in the controller namespace
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  # Leader election and event recording
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # CSI sidecar: PersistentVolume management (external-provisioner creates/deletes PVs)
  - apiGroups:
      - ""
    resources:
      - persistentvolumes
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  # CSI sidecar: PVC update (external-provisioner patches PVC status)
  - apiGroups:
      - ""
    resources:
      - persistentvolumeclaims/status
    verbs:
      - get
      - patch
      - update
  # CSI sidecar: VolumeAttachment (external-attacher watches/patches attachments)
  - apiGroups:
      - storage.k8s.io
    resources:
      - volumeattachments
    verbs:
      - get
      - list
      - patch
      - watch
  - apiGroups:
      - storage.k8s.io
    resources:
      - volumeattachments/status
    verbs:
      - get
      - patch
  # CSI sidecar: CSINode (external-provisioner reads node topology;
  # controller resolves initiator identity from annotations)
  - apiGroups:
      - storage.k8s.io
    resources:
      - csinodes
    verbs:
      - get
      - list
      - watch
  # PillarVolume CRD for durable CSI state tracking
  - apiGroups:
      - pillar-csi.pillar-csi.bhyoo.com
    resources:
      - pillarvolumes
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - pillar-csi.pillar-csi.bhyoo.com
    resources:
      - pillarvolumes/status
      - pillarvolumes/finalizers
    verbs:
      - get
      - patch
      - update
{{- end }}
---
{{/*
ClusterRole for the pillar-node DaemonSet.
Grants CSINode get/update/patch so the node plugin can publish protocol-specific
initiator identity annotations (RFC §5.2).
Controlled by .Values.rbac.create
*/}}
{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "pillar-csi.fullname" . }}-node
  labels:
    {{- include "pillar-csi.componentLabels" (dict "root" . "component" "node") | nindent 4 }}
rules:
  # Node plugin must patch CSINode annotations to publish NVMe host NQN and
  # iSCSI initiator IQN so that the controller can resolve initiator identity
  # without assuming node_id == NQN (RFC §5.2).
  - apiGroups:
      - storage.k8s.io
    resources:
      - csinodes
    verbs:
      - get
      - patch
      - update
{{- end }}
