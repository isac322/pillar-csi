apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pillar-csi.fullname" . }}-controller
  namespace: {{ include "pillar-csi.namespace" . }}
  labels:
    {{- include "pillar-csi.componentLabels" (dict "root" . "component" "controller") | nindent 4 }}
  {{- with .Values.controller.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.controller.replicaCount }}
  selector:
    matchLabels:
      {{- include "pillar-csi.controllerSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: controller
        {{- with .Values.controller.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "pillar-csi.controllerSelectorLabels" . | nindent 8 }}
        {{- with .Values.controller.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "pillar-csi.controllerServiceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 10
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: socket-dir
          emptyDir: {}
      containers:
        # ── pillar-csi controller (CRD reconciler + CSI Controller service) ───
        - name: controller
          image: {{ include "pillar-csi.image" (dict "image" .Values.controller.image "defaultTag" .Chart.AppVersion) }}
          imagePullPolicy: {{ include "pillar-csi.imagePullPolicy" (dict "image" .Values.controller.image "global" .Values.imagePullPolicy) }}
          command:
            - /manager
          args:
            - --leader-elect
            - --health-probe-bind-address=:{{ .Values.controller.healthProbePort }}
            - --metrics-bind-address=:{{ .Values.controller.metricsPort }}
            - --csi-address={{ .Values.controller.csiSocketPath }}
            {{- range .Values.controller.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- range .Values.controller.extraEnv }}
            - {{ toYaml . | nindent 14 | trim }}
            {{- end }}
          ports:
            - name: healthz
              containerPort: {{ .Values.controller.healthProbePort }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.controller.metricsPort }}
              protocol: TCP
            # csi-healthz is served by the liveness-probe sidecar over the CSI socket.
            # Declaring it here allows the probe below to reference it by name.
            - name: csi-healthz
              containerPort: {{ .Values.controller.livenessPort }}
              protocol: TCP
          # livenessProbe checks the CSI socket health via the liveness-probe sidecar.
          # The sidecar issues a CSI GetPluginInfo RPC and exposes the result on
          # controller.livenessPort; an HTTP 200 means the socket is healthy.
          livenessProbe:
            httpGet:
              path: /healthz
              port: csi-healthz
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          # readinessProbe checks the controller-manager's own /readyz endpoint,
          # which reflects leader-election and webhook readiness independent of CSI.
          readinessProbe:
            httpGet:
              path: /readyz
              port: healthz
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: socket-dir
              mountPath: {{ .Values.controller.csiSocketPath | dir }}

        # ── csi-provisioner sidecar ──────────────────────────────────────────
        - name: csi-provisioner
          image: {{ include "pillar-csi.image" (dict "image" .Values.controller.sidecars.provisioner.image "defaultTag" .Values.controller.sidecars.provisioner.image.tag) }}
          imagePullPolicy: {{ include "pillar-csi.imagePullPolicy" (dict "image" .Values.controller.sidecars.provisioner.image "global" .Values.imagePullPolicy) }}
          args:
            - --csi-address={{ .Values.controller.csiSocketPath }}
            - --leader-election
            - --leader-election-namespace={{ include "pillar-csi.namespace" . }}
            - --v=5
            {{- range .Values.controller.sidecars.provisioner.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.controller.sidecars.provisioner.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: socket-dir
              mountPath: {{ .Values.controller.csiSocketPath | dir }}

        # ── csi-attacher sidecar ─────────────────────────────────────────────
        - name: csi-attacher
          image: {{ include "pillar-csi.image" (dict "image" .Values.controller.sidecars.attacher.image "defaultTag" .Values.controller.sidecars.attacher.image.tag) }}
          imagePullPolicy: {{ include "pillar-csi.imagePullPolicy" (dict "image" .Values.controller.sidecars.attacher.image "global" .Values.imagePullPolicy) }}
          args:
            - --csi-address={{ .Values.controller.csiSocketPath }}
            - --leader-election
            - --leader-election-namespace={{ include "pillar-csi.namespace" . }}
            - --v=5
            {{- range .Values.controller.sidecars.attacher.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.controller.sidecars.attacher.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: socket-dir
              mountPath: {{ .Values.controller.csiSocketPath | dir }}

        # ── csi-resizer sidecar ──────────────────────────────────────────────
        - name: csi-resizer
          image: {{ include "pillar-csi.image" (dict "image" .Values.controller.sidecars.resizer.image "defaultTag" .Values.controller.sidecars.resizer.image.tag) }}
          imagePullPolicy: {{ include "pillar-csi.imagePullPolicy" (dict "image" .Values.controller.sidecars.resizer.image "global" .Values.imagePullPolicy) }}
          args:
            - --csi-address={{ .Values.controller.csiSocketPath }}
            - --leader-election
            - --leader-election-namespace={{ include "pillar-csi.namespace" . }}
            - --v=5
            {{- range .Values.controller.sidecars.resizer.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.controller.sidecars.resizer.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: socket-dir
              mountPath: {{ .Values.controller.csiSocketPath | dir }}

        # ── liveness-probe sidecar ───────────────────────────────────────────
        # Monitors the CSI Unix socket by issuing periodic GetPluginInfo RPCs.
        # Exposes /healthz HTTP endpoint on controller.livenessPort for the
        # main container's livenessProbe (and for external health monitoring).
        - name: liveness-probe
          image: {{ include "pillar-csi.image" (dict "image" .Values.controller.sidecars.livenessProbe.image "defaultTag" .Values.controller.sidecars.livenessProbe.image.tag) }}
          imagePullPolicy: {{ include "pillar-csi.imagePullPolicy" (dict "image" .Values.controller.sidecars.livenessProbe.image "global" .Values.imagePullPolicy) }}
          args:
            - --csi-address={{ .Values.controller.csiSocketPath }}
            - --health-port={{ .Values.controller.livenessPort }}
          ports:
            - name: csi-healthz
              containerPort: {{ .Values.controller.livenessPort }}
              protocol: TCP
          resources:
            {{- toYaml .Values.controller.sidecars.livenessProbe.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: socket-dir
              mountPath: {{ .Values.controller.csiSocketPath | dir }}
